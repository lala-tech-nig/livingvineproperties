<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Living Vine Whatsapp Harvester</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-darker: #030712;
      --bg-dark: #0f172a;
      --bg-light: #1e293b;
      --primary: #de1f25;
      --primary-hover: #b81419;
      --primary-glow: rgba(222, 31, 37, 0.2);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      width: 320px;
      background-color: var(--bg-darker);
      color: var(--text-main);
      overflow-x: hidden;
      font-size: 13px;
    }

    .container {
      padding: 16px;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-b: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    header h1 span {
      color: var(--primary);
    }

    .badge {
      font-size: 10px;
      background: var(--primary-glow);
      color: var(--primary);
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 99px;
      text-transform: uppercase;
      border: 1px solid rgba(222, 31, 37, 0.2);
    }

    /* Login Form */
    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-main);
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-glow);
    }

    /* Buttons */
    .btn {
      width: 100%;
      background: var(--primary);
      color: var(--text-main);
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      margin-top: 8px;
      font-size: 13px;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--bg-light);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Info Panels */
    .user-panel {
      background: var(--bg-dark);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      position: relative;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary-glow);
      border: 1px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: var(--primary);
      font-size: 14px;
    }

    .user-details h2 {
      font-size: 13px;
      font-weight: 700;
    }

    .user-details p {
      font-size: 11px;
      color: var(--text-muted);
    }

    .logout-link {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
    }

    .logout-link:hover {
      color: var(--primary);
    }

    /* Scrape Area */
    .scrape-status {
      background: var(--bg-dark);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      text-align: center;
    }

    .stats-number {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      margin: 4px 0;
    }

    .stats-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .scraped-info {
      font-size: 12px;
      margin-bottom: 10px;
      color: var(--text-main);
      font-weight: 500;
    }

    /* Message / Status alerts */
    .alert {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
      font-weight: 500;
      line-height: 1.4;
    }

    .alert-danger {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #a7f3d0;
    }

    .alert-info {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #93c5fd;
    }

    /* Hidden utility classes */
    .hidden {
      display: none !important;
    }

    .instruction {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      margin-top: 10px;
      border-t: 1px dashed rgba(255, 255, 255, 0.1);
      padding-top: 8px;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Living Vine <span>Harvester</span></h1>
      <div class="badge">CRM Ext</div>
    </header>

    <!-- Alert Box -->
    <div id="alertBox" class="alert"></div>

    <!-- Login Area -->
    <div id="loginSection">
      <div class="form-group">
        <label for="email">CRM Email</label>
        <input type="email" id="email" class="form-control" placeholder="staff@livingvine.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••">
      </div>
      <button id="loginBtn" class="btn">Login to CRM</button>
    </div>

    <!-- Main Harvester Area (Hidden by default) -->
    <div id="harvesterSection" class="hidden">
      <!-- User profile info -->
      <div class="user-panel">
        <span id="logoutBtn" class="logout-link">Logout</span>
        <div class="user-info">
          <div class="avatar" id="userAvatar">S</div>
          <div class="user-details">
            <h2 id="userName">Staff Name</h2>
            <p id="userRole">CRM Staff</p>
          </div>
        </div>
      </div>

      <!-- Scrape stats -->
      <div class="scrape-status">
        <div class="stats-label" id="groupNameLabel">No Group Selected</div>
        <div class="stats-number" id="contactCount">0</div>
        <div class="scraped-info" id="scrapedInfo">Contacts Scraped</div>
        <button id="scrapeBtn" class="btn btn-secondary">
          Scrape Active Chat
        </button>
        <div class="instruction">
          <strong>How to collect:</strong> Open a WhatsApp group chat, open the right-side <em>Group info</em> panel, scroll down to load participants, and click Scrape.
        </div>
      </div>

      <!-- Action Panel -->
      <div id="actionPanel" class="hidden">
        <button id="uploadBtn" class="btn">
          Auto-Upload to CRM Database
        </button>
        <button id="downloadExcelBtn" class="btn btn-secondary">
          Download Local Excel (.csv)
        </button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
